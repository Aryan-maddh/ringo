            - listitem [ref=e170]:
              - article "How KIKO Milano scales for Black Friday" [ref=e171]:
                - link [ref=e172] [cursor=pointer]:
                  - /url: /blog/how-kiko-milano-scales-for-black-friday
                  - generic [ref=e173]:
                    - generic [ref=e175]: Customers
                    - time [ref=e176]: May 5
                  - heading "How KIKO Milano scales for Black Friday" [level=2] [ref=e177]
                  - paragraph [ref=e179]: "KIKO Milano on Vercel: Eliminated 3 weeks of Black Friday infrastructure prep 75% decrease in app build times Went from minimal releases to deploying multiple times per day KIKO Milano’s ecommerce team used to treat peak traffic as an operations project. Weeks before Black Friday, they had to manually scale AWS infrastructure and adjust application configuration, knowing that if demand exceeded forecasts, their site could slow down or even break, costing them real revenue. After migrating to Vercel, they removed manual prep from their playbook. Instead of provisioning infrastructure, their team now ships campaigns and tests daily. The Black Friday problem: manual scaling and stressful failure modes Before Vercel, KIKO ran their ecommerce app on AWS EC2 instances sized for normal traffic, then scaled by hand ahead of peak periods. This was their previous process leading into Black Friday: Manual scaling window: Black Friday prep began 2–3 weeks ahead of the event, then had to be unwound after the traffic spike passed. Infrastructure configuration: The infra team manually adjusted AWS EC2 capacity to support expected traffic. Application configuration: Scaling also required application-side changes, making peak readiness more than just an infrastructure task. War room prep: Chat channels and conference rooms were set up for teams to triage performance and downtime problems. Beyond the manual prep work, KIKO’s dev team had to anticipate failure modes that hurt the business. Slow navigation and site instability made it hard for users to purchase, and, in Ant’s words, they knew that at any point, “everything could break.” Worry-free delivery and automatic scaling Vercel changed the work from preparation to execution. With environments available on demand, faster builds, and automatic scaling during traffic spikes, Ant’s team stopped planning around infrastructure limits and focused on the ecommerce experience itself. Environments without the bottleneck KIKO's old setup ran on a fixed number of shared environments, which constrained how the team handled dev, test, pre-prod, and prod work in parallel. On Vercel, Ant described provisioning new environments as \"snapping your fingers,\" including spinning them up on the fly when a project calls for it. Cloning environment variables is quick, and many changes that used to require code edits now \"just require redeployment.\" Shipping faster without the operational tax The dev team’s old pipeline took around 20 minutes to run, which meant they had to keep releases to a minimum. Builds on Vercel finish in under four minutes on average, even with many locales and a large catalog of pre-rendered pages. The deployments view in the Vercel dashboard gives the team one place to check build status and surface failures without digging through logs. No more performance variability during traffic spikes Performance used to swing with traffic, which meant the team felt every spike. Ant said that on Vercel, \"everything scales automatically.\" That’s possible because their Next.js app runs on infrastructure that separates static delivery, cached pages, and dynamic compute, so each part can scale independently during traffic spikes, instead of forcing the team to size and tune servers ahead of time. Beyond Black Friday: velocity, SEO, and innovation The infrastructure migration didn’t just change how KIKO prepares for traffic spikes, it changed how much operational work the team carries every week. Ant estimates that Vercel saves his team almost an entire day per week when all of the friction is added up, and that time savings has made the team more confident: the platform works, they can ship quickly, and when they need support, they know Vercel is there with them. About KIKO Milano: KIKO Milano is a global beauty brand delivering cosmetics and ecommerce experiences to customers worldwide."
                  - generic [ref=e180]:
                    - img [ref=e183]
                    - generic [ref=e184]: Meghan Schaefer
            - listitem [ref=e185]:
              - article "How General Intelligence used agents to build an agent platform on Vercel" [ref=e186]:
                - link [ref=e187] [cursor=pointer]:
                  - /url: /blog/how-general-intelligence-used-agents-to-build-an-agent-platform-on-vercel
                  - generic [ref=e188]:
                    - generic [ref=e190]: Customers
                    - time [ref=e191]: May 4
                  - heading "How General Intelligence used agents to build an agent platform on Vercel" [level=2] [ref=e192]
                  - paragraph [ref=e194]: "General Intelligence on Vercel 8-person team (5 engineers) shipping 10 PRs and 70+ commits per engineer, per day 4,000+ preview branches with ~100 parallel app versions running at any moment 90% of SRE work automated through Vercel and their own agent (Cofounder) Cofounder launches with a managed Vercel account for every customer General Intelligence is building a platform that lets any founder run a company entirely with AI agents. Their vision is the one-person, billion-dollar company where every department is driven by agents. Their flagship product, Cofounder, gives founders a full team of agents that cover engineering, marketing, SEO, finance, sales, customer support, and operations. General Intelligence is an 8-person company with 5 engineers. To ship a platform that lets their customers run agentic companies, they had to operate as one themselves. They wanted to use Cofounder's CTO agent to build out other agentic business functions, and their developers quickly learned that was an infrastructure problem, not an agent problem. For a complex, multi-tenant platform, the requirement was total programmatic control: every action a human could take on the underlying cloud platform had to be available to a coding agent through a CLI or APIs. That meant killing deployments, changing DNS, managing billing, editing configs, all of it. Most cloud providers failed that test, and that's why General Intelligence migrated to Vercel. Agents need infrastructure built for agents A coding agent runs dozens of processes in parallel. It queries logs as data, parses errors as input, and treats every dashboard click as a missing API. The bottleneck stops being how fast the agent can write code and becomes how much of the cloud it can actually reach. Most clouds aren't shaped for that pattern. They're built for human developers: dashboards to click, consoles to read, APIs that cover some operations but stop short of others. The closer an agent gets to running development end-to-end, the more those gaps stack up. General Intelligence started out hosting on Render. It worked for the early product, but provisioning preview environments for the full stack was painful from day one. When they started building Cofounder's CTO agent, that pain became a blocker. The platform had to be reachable end-to-end through code, and Render's Python support couldn't keep up with what the agent needed. \"There are vendors that let an agent do 5% of the work, and vendors that let an agent do 50%,\" explained Pignanelli. \"We needed a platform that would let an agent do 100%.\" They evaluated vendors against that bar and made the choice to migrate to Vercel. How five engineers ship like a hundred Migrating to Vercel changed how General Intelligence builds software, and their engineers don't develop locally anymore. Every change Cofounder's CTO agent makes goes straight to a Git branch, spins up a preview environment, and gets tested end-to-end by a browser agent on the live URL. General Intelligence has over 4,000 branches in flight. At any moment during a workday, around 100 versions of their app are running on Vercel, each on its own preview environment with a coding agent or browser agent operating it. Earlier this year, Fluid compute grew 6.5x month-over-month, and most of that growth was internal engineering work: coding agents building business agents in Cofounder. Today, engineers ships an average of 10 PRs a day with 70+ commits each, on a token budget of $5,000 per engineer per month. Migrating Cofounder's Python backend to Vercel General Intelligence runs a Python backend, and they were one of the first teams to migrate a complex full stack app Vercel. They did it deliberately, because the agent had to drive deployments, configs, and compute across the whole stack, not just the frontend. Unifying on one platform shrank the surface area for the team and the agent to one CLI, one API, and one observability layer. When something breaks, the agent and the developers have the full picture in one place. Running Cofounder as a multi-tenant app on Vercel When a founder spins up a company on Cofounder, they get more than a set of agents, they get a real GitHub repository and a managed Vercel deployment, provisioned automatically through Vercel for Platforms. Each company also gets its own domain, with SSL and DNS handled automatically. The engineering agent inside the customer's company is Cofounder's CTO, the same product General Intelligence uses internally. It runs the same workflow: branches, preview environments, browser agents testing the live URL. What's next General Intelligence will keep building their own company on the same products they ship to customers. As they add new departments and agents, Pignanelli says Vercel allows them to focus on the customer, not configuring the cloud underneath. General Intelligence is building Cofounder, the first full-stack agent company platform."
