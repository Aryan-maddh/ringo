        - generic [ref=e77]:
          - list [ref=e79]:
            - heading "Featured articles" [level=1] [ref=e80]
            - listitem [ref=e81]:
              - article "Agentic Infrastructure" [ref=e82]:
                - link [ref=e83] [cursor=pointer]:
                  - /url: /blog/agentic-infrastructure
                  - generic [ref=e84]:
                    - img "Vercel Triangle" [ref=e86]:
                      - img [ref=e87]
                    - time [ref=e90]: Apr 9
                  - heading "Agentic Infrastructure" [level=2] [ref=e91]
                  - paragraph [ref=e93]: "Every generation of software eventually demands a new generation of infrastructure. First, we configured servers by hand. Next, the cloud turned infrastructure into APIs. Then, a more important shift: infrastructure derived from the application itself. LLMs and coding agents are driving the next transition, and it's happening fast. In just three months, weekly deployments on Vercel have doubled, and agents are driving the growth. Today, over 30% of deployments are initiated by coding agents, up 1000% from six months ago. Claude Code accounts for 75%, Lovable and v0 for 6%, and Cursor for 1.5%. Software is now agentic Agents are building, testing, and shipping AI-native software, and they're doing it at a velocity that breaks traditional operations. Vercel projects deployed by coding agents are 20 times more likely to call AI inference providers than those deployed by humans. Agents are writing software that uses AI, and agents are building agents. As the final actor shifts from human to machine, infrastructure has to adapt again. It has to work for software that acts on behalf of users, writes itself, and increasingly needs to understand its own behavior in production. This new generation of agentic software demands Agentic Infrastructure. It’s not one evolution, but three: Infrastructure for coding agents to deploy to Infrastructure for building and running agents Infrastructure that itself is agentic 1. Infrastructure for coding agents to deploy to The bottleneck for agentic engineering is operational friction. When a coding agent writes a feature, it requires a place to run, test, and verify the output, which ultimately means it needs a URL. If the path from code to running system involves manual Terraform state or clicks in a cloud console UI, the autonomous loop breaks. Agents need programmatic, deterministic deployment surfaces. This is why immutable deployments, preview URLs on every commit, and instant rollbacks aren't just developer experience upgrades anymore. They are absolute prerequisites for machine-driven software development. Vercel's CLI, API, MCP servers, and git integration give agents native access to a deployment surface where they can generate code, open a PR, get a preview URL, verify the output, and ship to production, all without human intervention. 2. Infrastructure for building and running agents Serverless workloads need functions, caching, and short-lived requests at the edge, but managing that stack yourself means config drift and hours debugging across systems. Vercel solved that by unifying every layer into the frontend cloud. Agent workloads are a fundamentally different shape. They require long-lived execution, multi-step orchestration, model routing, cost controls, sandboxed code execution, and abuse resistance. It's a more complex stack, and the penalty for running it yourself compounds: every wasted request burns inference dollars, provider outages take your agent offline, and untrusted code opens the door to prompt injection. Vercel's agentic infrastructure unifies every AI primitive we've built into a single, secure platform, the same way we did for serverless. AI SDK gives developers a unified way to build AI-powered applications across frameworks and providers, and AI SDK 6 adds an agent abstraction so developers can define an agent once and reuse it across interfaces and workflows. Chat SDK makes agents available across dozens of chat apps and platforms from a single codebase. AI Gateway gives teams a single endpoint for hundreds of models, with budgets, monitoring, routing, retries, and fallbacks. Fluid compute is designed for the unusual shape of AI workloads, where latency, concurrency, and idle waiting all matter at once. Workflows and Queues give agents a way to pause, resume, retry, maintain state, and offload background work. Sandbox gives them isolated execution environments for untrusted code. Observability lets teams trace what agents are doing and where they are going wrong. Together, these building blocks give developers everything they need to build and run agents in one place. But Vercel also puts each of them into a single system with shared context: code, model calls, and runtime behavior. That context is what turns the infrastructure itself into an agent. 3. Infrastructure that is itself agentic Traditional infrastructure is a one-way street: code goes in, logs come out, and a human reads the logs to fix the code. A unified platform provides complete visibility across every layer in real time, giving agents the ability to not just monitor production, but autonomously respond to it. When a latency spike hits a critical route or a model provider drops requests, Vercel doesn't wait for a human to notice. It investigates the anomaly, queries observability data, reads logs, inspects source code, performs root-cause analysis, and reviews proposed fixes in isolated sandboxes. The platform interprets what the developer intended, observes what the system actually did, and acts on the delta. Today, that still happens with human approval in the loop. Over time, the platform will take on more of that operational burden, not because it's replacing developers, but because it has enough context to act on their behalf. Where we're going The history of cloud computing is the history of removing the human from the machine. Agentic infrastructure is the next evolution, moving us from passive tools that wait for commands to proactive systems that act on our behalf. The companies that win the next decade will build on infrastructure that expects software to write, ship, and heal itself."
                  - generic [ref=e94]:
                    - img [ref=e97]
                    - generic [ref=e98]: Tom Occhino
            - listitem [ref=e99]:
              - article "A new programming model for durable execution" [ref=e100]:
                - link [ref=e101] [cursor=pointer]:
                  - /url: /blog/a-new-programming-model-for-durable-execution
                  - generic [ref=e102]:
                    - img "Function" [ref=e104]:
                      - img [ref=e105]
                    - time [ref=e108]: Apr 16
                  - heading "A new programming model for durable execution" [level=2] [ref=e109]
                  - paragraph [ref=e111]: "The gap between prototypes and production-ready systems is huge. Code that's trivial to run locally falls apart the moment it needs to handle failures, restarts, and real traffic. Framework defined infrastructure solved this for web applications. When you deploy, Vercel infers the right configuration from the app itself. Workflows extends that model to long-running systems. Instead of managing a separate codebase for orchestration, durable workflows are an extension of your application code. Since launching in beta in October 2025, Workflows has processed over 100 million runs and over 500 million steps across more than 1,500 customers, with more than 200K npm downloads every week. Today, Vercel Workflows is generally available. Built for agents, backends, and long-running workloads Workflows is built for any workload that doesn’t fit in a single request. Agents: Deep integration with the AI SDK enables infinitely long running durable agents that can maintain state, tools, and handle external events or interruptions. AI SDK v7 is taking this further with WorkflowAgent. Backends: Workflow SDK proved this programming model in TypeScript codebases, and we're bringing it to a new language. The Workflow Python SDK is now in beta. Long-running workloads: Workflows can be used for any function that needs to execute reliably, including multi-step onboarding flows, payment processing, ETL pipelines, or any backend work that would otherwise require you to wire up your own queues and retry logic. How it works Shipping a reliable long-running process to production typically means splitting your code across queues, workers, status tables, retry logic, and monitoring. Dedicated orchestration services add yet another layer with long-lived background processes you run in Kubernetes, scale horizontally, and dedicate engineering time to keep healthy. They are distributed systems you pay for on top of your core application compute. Workflows eliminates the orchestrator entirely. All coordination runs in your application code, not a separate service. The infrastructure is built on three components: Event log: records every step input, output, stream chunk, sleep, hook, and error in a run. It is the single source of truth for execution state and history. Your functions on Fluid compute: each step runs as its own function invocation on Fluid compute. The workflow library inside each function handles dequeueing, state loading, encryption, execution, and handoff to the next step. Vercel Queues: each function enqueues the next step automatically. Queues run automatically on Vercel, in your own Postgres, or in-memory locally. Because there is no separate orchestration service, you only pay for the compute your steps actually use when functions are running. The programming model: your code is the orchestrator Workflows lets you write long-running functions in TypeScript or Python using normal control flow and a small API surface. In TypeScript you create a workflow with \"use workflow\", and isolate units of work with \"use step\". Workflows handles everything underneath: queues, retries, step isolation, observability, durable state, and streaming. At first glance, this looks like one function calling another, and that is exactly the point. Each step gets isolation, retries, persistence, observability, and durable continuation automatically. The orchestration lives in the application code, not in a separate system. A Next.js app with the Workflow SDK installed runs the same way locally as it does in production at scale, with the same code, real guarantees, and no separate orchestration tooling to configure. Vercel Workflows in action: Guillermo's infinite chess game One of the best examples from beta testing is Guillermo's infinite chess game. It continuously pits models against each other, feeding them the current board state, validating moves, rendering the game, and running matches indefinitely, turn after turn. Each chess match is a workflow run, and when a game ends, the last step starts a new run. Infinity is modeled as recursion across runs. Because every workflow run is pegged to a specific deployment, one game can safely finish on the version it started with while the next game begins on the latest deployment. That creates a clean upgrade boundary where each game remains stable within its version, and every new game picks up the latest improvements. If the backend code powering the chess match crashes or encounters transient errors, the workflow run automatically retries it without causing the application to fail. Why Workflows matters for agents Workflows is purpose-built for the agentic era. It is the only security-first, durable SDK made for building agents and made for agents to build with. Secure by default By default, Vercel Workflows encrypts all data, including step inputs, outputs, and stream chunks, before they leave your deployment. Nothing is readable in transit or at rest outside your environment, and decryption only happens inside the deployment running the workflow. Encryption is built in and free, not a security add-on you configure after the fact. This is possible because Workflows owns both orchestration and execution in the same environment, so encryption can happen automatically without a separate service or any extra infrastructure on your end. When you need to inspect encrypted data through the dashboard or workflow CLI, explicit decryption is supported with a full audit trail. For building agents Agents need more than longer timeouts, they need durable execution, reliable orchestration, resumable streams, and enough headroom to move large payloads through long-running systems. Durable agents Workflow SDK and AI SDK share a deep integration that gives agents durable execution, tool calling, state management, and the ability to handle external events or interruptions gracefully. Tools can be implemented as workflow steps for automatic retries or as regular workflow-level logic that uses primitives like sleep and hooks to suspend and resume cleanly. Agents process tool calls iteratively until completion, surviving restarts and failures along the way. AI SDK v7 takes this further with WorkflowAgent, a fully native implementation. Durable streams Durable streams persist agent output. getWritable() gives you a persistent stream that multiple clients can connect to, disconnect from, reconnect to later, and resume from any point. The workflow keeps running even if the user closes the browser. When they come back, the client reconnects and continues exactly where the stream left off, no Redis or custom pub/sub required. In this example, a flight booking agent streams itinerary updates as it plans a trip and searches for flights: The API route starts the workflow and returns the durable stream to the client. The run ID in the response header is what enables reconnection: If the user closes the browser mid-search, the workflow keeps running. When they re-connect, or share the link with a different user who opens the session, WorkflowChatTransport resumes the stream from the last event the client received. Hooks and sleep Workflows can suspend without incurring any compute. Hooks let a workflow wait for an external trigger to resume. Hooks are useful for building human-in-the-loop approval flows and integrating with third-party services. Sleep lets a workflow suspend for any specified amount of time, from minutes to days or months. Sleep is useful for email drip campaigns and date-sensitive use cases. Limits built for multimodal agents Workflows supports 50 MB per step payload and up to 2 GB across an entire run, with generous event limits. That's plenty of headroom for agents passing images, video, and large context across long execution chains. For agents to build with Workflows is not just great for building agents. It is also designed for coding agents to use directly. The programming model is agent-friendly Workflows code is ordinary TypeScript. A workflow is a function, a step is a function, and because orchestration lives in the application code itself, a coding agent only has to reason about one system. There is no separate orchestration layer to configure and no worker fleet to manage. Full observability from the CLI Workflow SDK ships with a CLI that any agent can use for inspecting and debugging your workflow runs. If a human can inspect runs in the dashboard, an agent can inspect the same workflow state from the terminal. This works locally with no config. For production deployments on Vercel, the CLI reuses your vercel CLI authentication with --backend vercel to make authenticated requests against the Vercel API. Agents can investigate state, inspect runs, and debug behavior without leaving the terminal. Workflows ships with a skill Agents can install the Workflows skill directly and use it to scaffold, debug, and manage workflows without hand-written product knowledge. Run Workflows anywhere Workflow SDK is open source and part of the same family as AI SDK and Chat SDK. The workflow npm package goes stable at GA with 200K+ weekly downloads and 75+ releases shipped during beta. Worlds are the adapter system that makes Workflows portable. Each World provides the three components a workflow needs (an event log, compute, and a queue), backed by different infrastructure. Managed: Vercel handles everything automatically. Deploy your app and Vercel Workflows runs on Fluid compute with Vercel Queues, zero-config E2E encryption, and built-in observability. Self-hosted: Run Workflows on your own infrastructure. We maintain a Postgres reference implementation that real customers run in production, and the Local World ships built in for development. Embedded: The SDK is not locked to one runtime, and the community is already building more Worlds, including adapters for MongoDB, Redis, Turso, Jazz Cloud, and Cloudflare. We'll continue to support anyone who wants to build Worlds. How Vercel customers use Workflows Mux powers durable video and AI pipelines Mux built their media intelligence layer on Workflows, handling execution, retries, and orchestration for AI inference across complex video pipelines. They also shipped \"use workflow\" and \"use step\" directives inside their own @mux/ai SDK, so any developer can npm install @mux/ai and get a durable, multi-step pipeline as a normal imported function. Durable runs hundreds of AI agents for 3 million small businesses Durable's most critical path is website creation: dozens of parallel AI steps orchestrated by Vercel Workflows to deliver a complete site in under 30 seconds. Their small dev team ripped out their self-hosted infrastructure entirely and rewrote on Workflows with 160+ directives across 75 files. Flora orchestrates creative AI agents across 50+ image models Flora runs their entire media generation pipeline on Vercel Workflows, orchestrating 50+ image models with no queues, no state machines, and no separate service. They use rollbacks for credit refunds, recursive workflows for user-defined multi-step pipelines, and getWritable for progress streaming. Their customers kick off jobs, close their laptop, and come back to completed results. What's next: Workflows 5 and Python support Workflows 5 Workflows 4 focused on getting the developer experience and SDK model right. Workflows 5 keeps the same programming model while pushing harder on performance and runtime efficiency. Here’s what we’re cooking: Native concurrency controls, including a lock primitive for coordinating work across multiple runs Globally deployed Workflows infrastructure A snapshot-based runtime to reduce replay overhead as event histories grow Better bundling and stronger Next.js integration Our goal is to make the overhead of opting into Workflows smaller and smaller until it is the obvious default for any project. Install workflow@beta to try Workflows 5 early (and share feedback on GitHub). Python support The Python SDK is now in beta, making Workflows available across the broader AI and backend ecosystem. Here's a quick taste of how the opening example in this post looks in Python: Get started Durability, reliability, observability, security, and streaming should be part of your product from the beginning, not chores you take on months later. When you use Workflows, we take on the complexity so you can focus on what makes your app unique. Learn more about Vercel Workflows or visit the Workflow SDK docs to get started. Vercel Workflows is generally available on April 16."
