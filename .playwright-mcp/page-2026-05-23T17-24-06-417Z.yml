                  - heading "2026 Vercel AI Accelerator recap" [level=2] [ref=e237]
                  - paragraph [ref=e239]: "On April 16th, 39 teams took the stage to pitch investors at Demo Day. During the prior six weeks, founders worked shoulder-to-shoulder with the Vercel team, our partners, and industry leaders to shape their ideas into the next generation of AI applications. Six weeks with the 2026 cohort Teams from around the world joined the 2026 cohort, building agents, developer tools, consumer apps, and vertical AI for finance, security, healthcare, and robotics. Each week, the cohort joined two sessions: a hands-on technical workshop and a fireside chat with an external speaker. The workshops covered the technical side of building AI products, from agents and models to deployment and scale. The fireside chats brought in industry leaders, Vercel experts, and investors. Speakers included Peter Steinberger (OpenAI/OpenClaw) and the Windsurf team, with topics ranging from the state of AI to pricing, legal, sales, marketing, and fundraising. Builder day Halfway through the program, the cohort came together with the broader Vercel startup ecosystem for Builder Day at Vercel's office. The day combined technical workshops, hands-on office hours with engineers from accelerator partners like AWS and Anthropic, open time to build and connect, and a special fireside chat between Malte Ubl (Vercel CTO) and Stephen Haney (Paper CEO). $8M in infrastructure and credits Beyond the programming, every team got over $200K to build with on Vercel and across the AI stack: Vercel AI stack: AI Gateway, Sandbox, Workflows, Fluid Compute, v0, and more Partners: AWS, Anthropic, OpenAI, Browserbase, ElevenLabs, Auth0, WorkOS, Notion, Modal, Neon, Supabase, and more Demo Day After six weeks of building, the cohort showed their work at Demo Day. Auth0 hosted the event at their offices, and each team had a few minutes to present to a room of VCs, AI leaders, and partners, with a panel of judges from across the AI ecosystem selecting the winners. Winners On Demo Day, judges scored teams on problem validity, technology fit, product quality, and each team's final pitch. Three teams took home $100K+ in credits and prizes, and the first-place team also received an investment from Vercel Ventures. 1st: Rex Rex is building AI for the enterprise finance back office, unifying customer context across systems so agents can run accounts receivable end to end. In addition to credits, Rex received an investment from Vercel Ventures. 2nd: Hacktron AI Hacktron AI is an AI teammate for security. As AI writes more of the code shipping into production, vulnerabilities scale with it. Hacktron integrates into the development lifecycle to find and remediate real, exploitable issues. 3rd: Roots Roots is rebuilding how people buy and sell homes. Buyers save hundreds to thousands of dollars a month, and sellers net thousands more at closing. $100M+ in fundraising, and counting The 40 alumni from the last cohort have raised over $100M in venture funding, and several have been accepted to Y Combinator. Stably, the 2025 winner, is now converting enterprise pilots into contracts and shipping new product lines in hours instead of weeks. Other teams from past cohorts, including Jigsaw Stack, Belli AI, and General Translation, have signed enterprise customers and formed partnerships through the program. Apply to the next cohort If you're an early-stage founder building in AI, you can apply for the next AI Accelerator program. We will open applications later this year. Visit our startup hub to learn more and connect with our startups team."
