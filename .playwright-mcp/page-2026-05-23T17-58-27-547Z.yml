        - generic [ref=e45]: OUR MISSION
        - heading "Make every contractor unreachable — in a good way." [level=2] [ref=e46]
        - paragraph [ref=e47]: The best contractors we know aren't glued to their phones — they're on the job, doing the work that earns their reputation. But the moment they miss a call, they risk losing that lead to someone who picked up.
        - paragraph [ref=e48]: Ripe Lead gives every contractor the response time of a 24/7 call center without the overhead. We handle the reply, the qualification, the booking — so the contractor handles the job.
        - paragraph [ref=e49]: "We measure success one way: jobs booked that would otherwise have been lost to voicemail."
