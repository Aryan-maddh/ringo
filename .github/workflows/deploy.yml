name: Deploy to Cloud Run

on:
  push:
    branches: [master]
  workflow_dispatch: {}

# Don't cancel mid-deploy; queue subsequent pushes so revisions land in order
concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  REGION: us-central1
  REPO: ringo

jobs:
  backend:
    name: Deploy ringo-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push image (Cloud Build, async)
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${REPO}/ringo-backend:${GITHUB_SHA::12}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          # --async returns the build ID and exits 0 immediately, sidestepping
          # gcloud's log-streaming permission requirement (project Viewer/Owner).
          BUILD_ID=$(gcloud builds submit backend/ \
            --tag "$IMAGE" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --async \
            --format='value(id)' \
            --quiet)
          echo "Build ID: $BUILD_ID"
          echo "Polling build status..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --format='value(status)')
            case "$STATUS" in
              SUCCESS)
                echo "Build succeeded."
                break ;;
              FAILURE|TIMEOUT|CANCELLED|INTERNAL_ERROR|EXPIRED)
                echo "::error::Build failed: $STATUS"
                echo "View logs: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=${{ vars.GCP_PROJECT_ID }}"
                exit 1 ;;
              *)
                echo "  status=$STATUS — waiting 10s..."
                sleep 10 ;;
            esac
          done

      - name: Deploy revision to Cloud Run
        run: |
          gcloud run deploy ringo-backend \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --quiet
          echo "::notice title=Deployed::ringo-backend @ ${GITHUB_SHA::12}"

  frontend:
    name: Deploy ringo-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & push image (Cloud Build, async)
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${REPO}/ringo-frontend:${GITHUB_SHA::12}"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          BUILD_ID=$(gcloud builds submit . \
            --tag "$IMAGE" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --async \
            --format='value(id)' \
            --quiet)
          echo "Build ID: $BUILD_ID"
          echo "Polling build status..."
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --format='value(status)')
            case "$STATUS" in
              SUCCESS)
                echo "Build succeeded."
                break ;;
              FAILURE|TIMEOUT|CANCELLED|INTERNAL_ERROR|EXPIRED)
                echo "::error::Build failed: $STATUS"
                echo "View logs: https://console.cloud.google.com/cloud-build/builds/$BUILD_ID?project=${{ vars.GCP_PROJECT_ID }}"
                exit 1 ;;
              *)
                echo "  status=$STATUS — waiting 10s..."
                sleep 10 ;;
            esac
          done

      - name: Deploy revision to Cloud Run
        run: |
          gcloud run deploy ringo-frontend \
            --image "$IMAGE" \
            --region "$REGION" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --quiet
          echo "::notice title=Deployed::ringo-frontend @ ${GITHUB_SHA::12}"
